<!DOCTYPE HTML>
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Highcharts Example</title>

		<style type="text/css">
.highcharts-figure, .highcharts-data-table table {
    min-width: 320px; 
    max-width: 800px;
    margin: 1em auto;
}

.highcharts-data-table table {
	font-family: Verdana, sans-serif;
	border-collapse: collapse;
	border: 1px solid #EBEBEB;
	margin: 10px auto;
	text-align: center;
	width: 100%;
	max-width: 500px;
}
.highcharts-data-table caption {
    padding: 1em 0;
    font-size: 1.2em;
    color: #555;
}
.highcharts-data-table th {
	font-weight: 600;
    padding: 0.5em;
}
.highcharts-data-table td, .highcharts-data-table th, .highcharts-data-table caption {
    padding: 0.5em;
}
.highcharts-data-table thead tr, .highcharts-data-table tr:nth-child(even) {
    background: #f8f8f8;
}
.highcharts-data-table tr:hover {
    background: #f1f7ff;
}

		</style>
	</head>
	<body>
<script src="https://acarreouy.github.io/SICIp/Graficas/code/highcharts.js"></script>
<script src="https://acarreouy.github.io/SICIp/Graficas/code/modules/networkgraph.js"></script>
<script src="https://acarreouy.github.io/SICIp/Graficas/code/modules/exporting.js"></script>

<figure class="highcharts-figure">
    <div id="container"></div>
    <p class="highcharts-description">
      Coocurrencia de palabras clave.
    </p>
</figure>
		<script type="text/javascript">
// Add the nodes option through an event call. We want to start with the parent
// item and apply separate colors to each child element, then the same color to
// grandchildren.
Highcharts.addEvent(
    Highcharts.Series,
    'afterSetOptions',
    function (e) {
        var colors = Highcharts.getOptions().colors,
            i = 0,
            nodes = {};

        if (
            this instanceof Highcharts.seriesTypes.networkgraph &&
            e.options.id === 'lang-tree'
        ) {
            e.options.data.forEach(function (link) {

                if (link[0] === 'Coocurrencia') {
                    nodes['Proto Indo-European'] = {
                        id: 'Proto Indo-European',
                        marker: {
                            radius: 30
                        }
                    };
                    nodes[link[1]] = {
                        id: link[1],
                        marker: {
                            radius: 20
                        },
                        color: colors[i++]
                    };
                } else if (nodes[link[0]] && nodes[link[0]].color) {
                    nodes[link[1]] = {
                        id: link[1],
                        color: nodes[link[0]].color
                    };
                }
            });

            e.options.nodes = Object.keys(nodes).map(function (id) {
                return nodes[id];
            });
        }
    }
);

Highcharts.chart('container', {
    chart: {
        type: 'networkgraph',
        height: '80%'
    },
    title: {
        text: 'Coocurrencia'
    },
    subtitle: {
        text: 'palabras clave'
    },
    plotOptions: {
        networkgraph: {
            keys: ['from', 'to'],
            layoutAlgorithm: {
                enableSimulation: true,
                friction: -0.6
            }
        }
    },
    series: [{
        dataLabels: {
            enabled: true,
            linkFormat: ''
        },
        id: 'lang-tree',
        data: [
          ['Hipermodernidad', 'Trabajo'],
            ['Hipermodernidad', 'Trabajo'],
            ['Hipermodernidad', 'Violencia'],
            ['Hipermodernidad', 'Sujeto'],
            ['Salud Mental', 'Apoyo Social'],
            ['Salud Mental', 'Psicología'],
            ['Salud Mental', 'Estudiantes universitarios'],
            ['Inclusión digital', 'Tecnologías digitales'],
            ['Inclusión digital', 'Personas mayores'],
            ['Inclusión digital', 'Tecnologías digitales'],
            ['Psicología', 'Investigación'],
            ['Psicología', 'Salud mental'],
            ['Psicofármacos', 'Subjetividad'],
            ['Psicofármacos', 'Chile'],
            ['Psicofármacos', 'Prácticas psicológicas'],
            ['Psicofármacos', 'Gubernamentalidad'],
            ['Trabajo', 'Psicoanálisis'], 
            ['Trabajo', 'Motivación'],
            ['TIC', 'Feminismo'],
            ['TIC', 'Personas mayores'],
            ['Sexualidad', 'Prácticas sexuales'],
            ['Sexualidad', 'Liberalismo sexual'],
            ['Sexualidad', 'Escala'],
            ['Sexualidad', 'Autismo'],
            ['Sexualidad', 'Prácticas sexuales'],
            ['Sexualidad', 'Liberalismo sexual'],
            ['Sexualidad', 'Escala'],
            ['Psicología social comunitaria', 'Epistemología'],
            ['Psicología social comunitaria', 'Investigación cualitativa'],
            ['Psicología social comunitaria', 'Ética'],
            ['Psicología comunitaria', 'Violencia'],
            ['Psicología comunitaria', 'Pobreza'],
            ['Género', 'Análisis de discurso'],
            ['Género', 'Análisis de discurso'],
            ['Género', 'Prisión'],
            ['Narrativa', 'Feminismo'],
            ['Narrativa', 'Investigación cualitativa'],
            ['Jóvenes', 'Redes sociales'],
            ['Investigación cualitativa', 'Prisión'],
            ['Estudiantes universitarios', 'Mujeres'],
            ['Estudiantes universitarios', 'Comprensión lectora'],
            ['TDAH', 'Redes Sociales'],
            ['TDAH', 'Medicalización'],
            ['TDAH', 'Narrativa'],
            ['Representaciones sociales', 'Mujeres'],
            ['Representaciones sociales', 'Mujeres'],
            ['Psiquiatría', 'Medicalización'],
            ['Familia', 'Desigualdad'],
            ['Familia', 'inclusión social ']
        ]
    }]
});

		</script>
	</body>
</html>
