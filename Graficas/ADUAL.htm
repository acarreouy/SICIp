<figure class="highcharts-figure">
    <div id="container"></div>
    <p class="highcharts-description">
        La perdida de utilidad y la vida media de cada año se comportan de forma inversamente proporcional, en la medida que la vida media de las referencias aumenta, diminuye la perdida anual de utilidad.
    </p>
</figure>



		<script type="text/javascript">
        Highcharts.chart('container', {
    chart: {
        zoomType: 'xy'
    },
    title: {
        text: 'Vida media de las referencias y su perdida de utilidad en cada año'
    },
    subtitle: {
        text: '2015-2020'
    },
    xAxis: [{
        categories: ['2015', '2016', '2017', '2018', '2019', '2020'],
        crosshair: true
    }],
    yAxis: [{ // Primary yAxis
        labels: {
            format: '{value} %',
            style: {
                color: Highcharts.getOptions().colors[1]
            }
        },
        title: {
            text: 'Perdida anual de utilidad',
            style: {
                color: Highcharts.getOptions().colors[1]
            }
        }
    }, { // Secondary yAxis
        title: {
            text: 'Edad de las referencias',
            style: {
                color: Highcharts.getOptions().colors[0]
            }
        },
        labels: {
            format: '{value} AÑOS',
            style: {
                color: Highcharts.getOptions().colors[0]
            }
        },
        opposite: true
    }],
    tooltip: {
        shared: true
    },
    legend: {
        layout: 'vertical',
        align: 'left',
        x: 120,
        verticalAlign: 'top',
        y: 100,
        floating: true,
        backgroundColor:
            Highcharts.defaultOptions.legend.backgroundColor || // theme
            'rgba(255,255,255,0.25)'
    },
    series: [{
        name: 'Vida media',
        type: 'spline',
        yAxis: 1,
        data: [9, 10, 8, 9, 9, 8],
        tooltip: {
            valueSuffix: ' AÑOS'
        }

    }, {
        name: 'Perdida de utilidad',
        type: 'spline',
        data: [9.5, 7, 9, 8, 9, 11],
        tooltip: {
            valueSuffix: '%'
    }    

        }]
});
		</script>
