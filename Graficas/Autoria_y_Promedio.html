<figure class="highcharts-figure">
    <div id="container"></div>
    <p class="highcharts-description">
        Sobre un total de 140 artículos, observamos 57 artículos con autoría individual, y 83 con autoría múltiple. Si bien los primeros dos años observamos una autoría individual mayor, a partir del 2017 se comienza a observar una tendencia hacía un predominio de la autoría múltiple. Con un promedio de 2.3357 autores por artículo.
    </p>
</figure>



		<script type="text/javascript">
Highcharts.chart('container', {
    title: {
        text: 'Distribución de la autoría por año 2015-2020'
    },
    xAxis: {
        categories: ['2015', '2016', '2017', '2018', '2019', '2020']
    },
    labels: {
        items: [{
            html: '',
            style: {
                left: '50px',
                top: '18px',
                color: ( // theme
                    Highcharts.defaultOptions.title.style &&
                    Highcharts.defaultOptions.title.style.color
                ) || 'black'
            }
        }]
    },
    series: [{
        type: 'column',
        name: 'Autoria individual',
        data: [10, 20, 7, 11, 5, 4]
    }, {
        type: 'column',
        name: 'Autoria múltiple',
        data: [8, 5, 11, 11, 22, 26]
    }, {
        type: 'spline',
        name: 'Promedio',
        data: [9, 12.5, 9, 11, 13.5, 15],
        marker: {
            lineWidth: 2,
            lineColor: Highcharts.getOptions().colors[3],
            fillColor: 'white'
        }
    }, {
        type: 'pie',
        name: 'Total',
        data: [{
            name: 'Autoría individual',
            y: 57,
            color: Highcharts.getOptions().colors[0] // Jane's color
        }, {
            name: 'Autoría múltiple',
            y: 83,
            color: Highcharts.getOptions().colors[1] // John's color
        }],
        center: [400, 50],
        size: 100,
        showInLegend: false,
        dataLabels: {
            enabled: false
        }
    }]
});
