<figure class="highcharts-figure">
    <div id="container"></div>
    <p class="highcharts-description">
        Curva con la distribución de autores según la cantidad de artículos
    </p>
</figure>



		<script type="text/javascript">
Highcharts.chart('container', {
    chart: {
        type: 'spline',
        inverted: true
    },
    title: {
        text: 'Cantidad de autores por cantidad de artículos'
    },
    subtitle: {
        text: 'periódo 2015-2020'
    },
    xAxis: {
        reversed: false,
        title: {
            enabled: true,
            text: 'Firmas'
        },
        labels: {
            format: '{value} '
        },
        accessibility: {
            rangeDescription: 'Range: 0 to 10'
        },
        maxPadding: 0.05,
        showLastLabel: true
    },
    yAxis: {
        title: {
            text: 'Artículos'
        },
        labels: {
            format: '{value} '
        },
        accessibility: {
            rangeDescription: 'Range: 0 to 60'
        },
        lineWidth: 1
    },
    legend: {
        enabled: false
    },
    tooltip: {
        headerFormat: '<b>{series.name}</b><br/>',
        pointFormat: '{point.x} : {point.y} '
    },
    plotOptions: {
        spline: {
            marker: {
                enable: false
            }
        }
    },
    series: [{
        name: 'Articulos',
        data: [[1, 58], [2, 34], [3, 19], [4, 15], [5, 8],
            [6, 3], [8, 2], [9, 1]]
    }]
});
		</script>
