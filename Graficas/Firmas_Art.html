<figure class="highcharts-figure">

    <p class="highcharts-description">

		<script type="text/javascript">
Highcharts.chart('container', {

    title: {
            text: 'Evolución de la cantidad de autores firmantes de los artículos', // título
            x: -20 
        },
        subtitle: {
            text: 'durante el período 2015-2020', // subtítulo
            x: -20
        },
        xAxis: {
            categories: ['2015', '2016', '2017', '2018', '2019', '2020'] // categorías
        },
        yAxis: {
            title: {
                text: 'N° de artículos' // nombre del eje de Y
            },            
            plotLines: [{
                color: '#808080' 
            }]
    },
        tooltip: {
            valueSuffix: ' Autores' // el sufijo de la información presente en el "tooltip"
        },
        legend: { // configuración de la leyenda
            layout: 'horizontal',
            align: 'center',
            verticalAlign: 'bottom',
            borderWidth: 1
        },
       series: [{
        name: '1 Firma',
        data: [10, 20, 7, 12, 5, 4]
    }, {
        name: '2 Firmas',
        data: [2, 4, 5, 6, 8, 9]
    }, {
        name: '3 Firmas',
        data: [3, null, 3, 2, 7, 4]

        data: [null, null, 1, null, null, 1]
    }, {
        name: '9 Firmas',
        data: [null, null, null, null, 9, null]    
    }],
    responsive: {
        rules: [{
            condition: {
                maxWidth: 500
            },
            chartOptions: {
                legend: {
                    layout: 'horizontal',
                    align: 'center',
                    verticalAlign: 'bottom'
                }
            }
        }]
    }

});
