<figure class="highcharts-figure">
    <div id="container"></div>
    <p class="highcharts-description">
        Cantidad de artículos, según el tipo. Sobre un total de 140 artículos encontramos: 41 revisiones y 99 trabajos originales, en 5 años, dondé se publicaron 13 números.
    </p>
</figure>
		<script type="text/javascript">
Highcharts.chart('container', {

    title: {
            text: 'Artículos publicados según el tipo por año', // título
            x: -20 
        },
        subtitle: {
            text: 'Año 2015-2020', // subtítulo
            x: -20
        },
        xAxis: {
            categories: ['0.00, 0.30, 0.47, 0.60, 0.69, 0.84, 0.95, 1.04, 1.11, 1.23, 1.53, 1.72, 1.90, 2.12, 2.44, 3.06'] // categorías
        },
        yAxis: {
            type: 'logarithmic',
        minorTickInterval: 1,
            title: {
                text: 'Cantidad de artículos' // nombre del eje de Y
            },
            plotLines: [{
                color: '#808080' 
            }]
        },
        tooltip: {
            valueSuffix: ' Artículos' // el sufijo de la información presente en el "tooltip"
        },
        legend: { // configuración de la leyenda
            layout: 'horizontal',
            align: 'center',
            verticalAlign: 'bottom',
            borderWidth: 1
        },
       series: [{
        name: 'Revisiones',
        data: [0.00, 0.30, 0.47, 0.60, 0.69, 0.84, 0.95, 1.04, 1.11, 1.23, 1.53, 1.72, 1.90, 2.12, 2.44, 3.06]
    }],
    responsive: {
        rules: [{
            condition: {
                maxWidth: 1200
            },
            chartOptions: {
                legend: {
                    layout: 'horizontal',
                    align: 'center',
                    verticalAlign: 'bottom'
                }
            }
        }]
    }

});
