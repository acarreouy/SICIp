<figure class="highcharts-figure">
    <div id="container"></div>
    <p class="highcharts-description">
        Se agrupan la cantidad de firmas en columnas subdivididas por el año de publicación.
    </p>
</figure>
		<script type="text/javascript">
Highcharts.chart('container', {
    chart: {
        type: 'column'
    },
    title: {
        text: 'Distribución de firmas por año'
    },
    xAxis: {
        categories: ['1 Firma', '2 Firmas', '3 Firmas', '4 Firmas', '5 Firmas', '6 Firmas', '8 Firmas', '9 Firmas']
    },
    yAxis: {
        min: 0,
        title: {
            text: 'Porcentaje de firmas'
        }
    },
    tooltip: {
        pointFormat: '<span style="color:{series.color}">{series.name}</span>: <b>{point.y}</b> ({point.percentage:.0f}%)<br/>',
        shared: true
    },
    plotOptions: {
        column: {
            stacking: 'percent'
        }
    },
    series: [{
        name: '2015',
        data: [10, 4, 9, 8, 5, null, null, null]
    }, {
        name: '2016',
        data: [20, 8, null, 4, null, null, 1, null]
    }, {
        name: '2017',
        data: [7, 10, 9, 8, null, null, 8, null]
    }, {
        name: '2018',
        data: [11, 14, 6, 8, null, null, null, null]
    }, {
        name: '2019',
        data: [5, 16, 21, 16, 5, 6, null, 9]
    }, {
        name: '2020',
        data: [4, 18, 12, 16, 30, 12, 8, null]
    }, ]
});
