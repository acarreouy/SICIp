<figure class="highcharts-figure">
    <div id="container"></div>
    <p class="highcharts-description">
        Se agrupan la cantidad de firmas en columnas subdivididas por el tipo de artículo. Sobre un total de 303 autores tenemos 316 firmas. Sobre un total de 135 artículos, 80 tienen autoría multiple, mientras que 55 tienen un solo autor.
        Subdividiendo por el tipo de artículo encontramos de 95 trabajos originales 40 con  un solo autor y de 40 revisiones 15 tienen un solo autor.
    </p>
</figure>
		<script type="text/javascript">
Highcharts.chart('container', {
    chart: {
        type: 'column'
    },
    title: {
        text: 'Tipo de artículo por cantidad de firmas'
    },
    xAxis: {
        categories: ['1 Firma', '2 Firmas', '3 Firmas', '4 Firmas', '5 Firmas', '6 Firmas', '8 Firmas', '9 Firmas']
    },
    yAxis: {
        min: 0,
        title: {
            text: 'Cantidad de autores'
        }
    },
    tooltip: {
        pointFormat: '<span style="color:{series.color}">{series.name}</span>: <b>{point.y}</b> ({point.percentage:.0f}%)<br/>',
        shared: true
    },
    plotOptions: {
        column: {
            stacking: 'percent'
        }
    },
    series: [{
        name: 'Trabajos originales',
        data: [40, 23, 12, 8, 8, 2, 1, 1]
    }, {
        name: 'Revisiones',
        data: [15, 11, 6, 6, null, 1, 1, null]
    }, {
        type: 'spline',
        name: 'Promedio',
        data: [27.5, 17, 9, 7, 4, 1.5, 1, 0.5],
        marker: {
            lineWidth: 2,
            lineColor: Highcharts.getOptions().colors[3],
            fillColor: 'white'
        } 
            }]
});
        </script>
