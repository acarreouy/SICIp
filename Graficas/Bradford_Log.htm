<figure class="highcharts-figure">
    <div id="container"></div>
    <p class="highcharts-description">
        El postulado teórico de la formulación de Bradford sostiene que:
		si un conjunto de revistas científicas se dispone en orden decreciente, 
		de acuerdo con la cantidad de artículos que contengan éstas sobre un tema y
		un periodo determinado, se pueden distinguir tres clases o zonas que agrupan
		aproximadamente igual número de artículos cada una.· (Bradford; 1948, p. 116)
    </p>
</figure>
		<script type="text/javascript">
Highcharts.chart('container', {

    title: {
        text: 'Grafica Logaritmica de Bradford'
    },

    xAxis: {
        tickInterval: 0.1,
        type: 'logarithmic',
        accessibility: {
            rangeDescription: 'Range: 1 to 1089'
    }
    },

    yAxis:{
        type: 'logarithmic',
        minorTickInterval: 0.1,
        accessibility: {
            rangeDescription: 'Range: 22 to 161'
        }
    },

    tooltip: {
        headerFormat: '<b>Revistas (r)</b><br />',
        pointFormat: 'x = {point.x}, y = {point.y}'
    },

    series: [{
        data: [22, 42, 61, 77, 90, 102, 113, 123, 132, 140, 146, 151, 155, 158, 160, 161],
        pointStart: 1
    }]
});
	</script>
