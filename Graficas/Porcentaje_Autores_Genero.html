<figure class="highcharts-figure">

    <p class="highcharts-description">
        Sobre un total de 307 Autores, tenemos 178 mujeres, 58 % y 129 varones, 42 %.
    </p>
</figure>


		<script type="text/javascript">
Highcharts.chart('container', {
    chart: {
        type: 'pie',
        options3d: {
            enabled: true,
            alpha: 45,
            beta: 0
        }
    },
    title: {
        text: 'Porcentaje de autores por género 2015-2020'
    },
    accessibility: {
        point: {
            valueSuffix: '%'
        }
    },
    tooltip: {
        pointFormat: '{series.name}: <b>{point.percentage:.1f}%</b>'
    },
    plotOptions: {
        pie: {
            allowPointSelect: true,
            cursor: 'pointer',
            depth: 35,
            dataLabels: {
                enabled: true,
                format: '{point.name}'
            }
        }
    },
    series: [{
        type: 'pie',
        name: 'Género', 
        data: [
            ['Femenino', 178],
            {
                name: 'Masculino',
                y: 129,
                sliced: true,
                selected: true
            },
            ]
    	}]
});
