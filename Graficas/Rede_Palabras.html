<figure class="highcharts-figure">

        Observamos la red de palabras clave.
    </p>
</figure>
		<script type="text/javascript">
// Agregue la opción de nodos a través de una llamada de evento. Queremos empezar con el padre
// elemento y aplicar colores separados a cada elemento hijo, luego el mismo color a
// nietos.
Highcharts.addEvent(
    Highcharts.Series,
    'afterSetOptions',
    function (e) {
        var colors = Highcharts.getOptions().colors,
            i = 0,
            nodes = {};

        if (
            this instanceof Highcharts.seriesTypes.networkgraph &&
            e.options.id === 'lang-tree'
        ) {
            e.options.data.forEach(function (link) {

                if (link[0] === 'Coocurrencia') {
                    nodes['Proto Indo-European'] = {
                        id: 'Proto Indo-European',
                        marker: {
                            radius: 30
                        }
                    };
                        nodes[link[1]] = {
                        id: link[1],
                        marker: {
                            radius: 20
                        },
                        color: colors[i++]
                    };
                } else if (nodes[link[0]] && nodes[link[0]].color) {
                    nodes[link[1]] = {
                        id: link[1],
                        color: nodes[link[0]].color
                                            
                    };
                }
            });

            e.options.nodes = Object.keys(nodes).map(function (id) {
                return nodes[id];
            });
        }
    }
);

Highcharts.chart('container', {
    chart: {
        type: 'networkgraph',
        height: '80%'
    },
    title: {
        text: 'Coocurrencia de palabras clave en la revista PCS'
    },
    subtitle: {
        text: '2015-2020'
    },
    plotOptions: {
        networkgraph: {
            keys: ['from', 'to'],
            layoutAlgorithm: {
                enableSimulation: true,
                friction: -0.6
            }
        }
    },
    series: [{
        dataLabels: {
            enabled: true,
            linkFormat: ''
        },
        id: 'lang-tree',
        data: [
