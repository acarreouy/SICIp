<figure class="highcharts-figure">
    <div id="container"></div>
    <p class="highcharts-description">
        Sobre un total de 316 firmas, tenemos 223 en trabajos originales y 93 en revisiones.
    </p>
</figure>


		<script type="text/javascript">
Highcharts.chart('container', {
    chart: {
        type: 'pie',
        options3d: {
            enabled: true,
            alpha: 45,
            beta: 0
        }
    },
    title: {
        text: 'Porcentaje de autores por tipo de artículo 2015-2020'
    },
    accessibility: {
        point: {
            valueSuffix: '%'
        }
    },
    tooltip: {
        pointFormat: '{series.name}: <b>{point.percentage:.1f}%</b>'
    },
    plotOptions: {
        pie: {
            allowPointSelect: true,
            cursor: 'pointer',
            depth: 35,
            dataLabels: {
                enabled: true,
                format: '{point.name}'
            }
        }
    },
    series: [{
        type: 'pie',
        name: 'Autores',
        data: [
            ['Revisiones 29.4%', 93],
            {
        name: 'Trabajos originales 70.6%',
                y: 213,
                sliced: true,
                selected: true,
        },
            ]
    }]
});
		</script>
