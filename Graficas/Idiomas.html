<figure class="highcharts-figure">
    <div id="container"></div>
    <p class="highcharts-description">
        Se agrupan los artículos en columnas por tipo subdivididas por el idioma de los mismos.
		Podemos observar que en los tres idiomas son preponderantes los trabajos originales, sobre las revisiones.
    </p>
</figure>
		<script type="text/javascript">
Highcharts.chart('container', {
    chart: {
        type: 'column'
    },
    title: {
        text: 'Idioma de los artículos'
    },
    xAxis: {
        categories: ['Español', 'Portugués', 'Inglés']
    },
    yAxis: {
        min: 0,
        title: {
            text: 'Total de artículos'
        }
    },
    tooltip: {
        pointFormat: '<span style="color:{series.color}">{series.name}</span>: <b>{point.y}</b> ({point.percentage:.0f}%)<br/>',
        shared: true
    },
    plotOptions: {
        column: {
            stacking: 'percent'
        }
    },
    series: [{
        name: 'Trabajos originales',
        data: [58, 30, 7]
    }, {
        name: 'Revisiones',
        data: [27, 9, 4]
    }]
});
