<figure class="highcharts-figure">
    <div id="container"></div>
    <p class="highcharts-description">
        
        Distribución del total de referencias anual, referencias con una antigüedad menor a 5 años y mayor a 5 años.
    </p>
</figure>
		<script type="text/javascript">
Highcharts.chart('container', {

    title: {
            text: 'Referencias', // título
            x: -20 
        },
        subtitle: {
            text: 'período 2015-2020', // subtítulo
            x: -20
        },
        xAxis: {
            categories: ['2015', '2016', '2017', '2018', '2019', '2020'] // categorías
        },
        yAxis: {
            title: {
                text: 'Cantidad de referencias' // nombre del eje de Y
            },
            plotLines: [{
                color: '#808080' 
            }]
        },
        tooltip: {
            valueSuffix: ' Referencias' // el sufijo de la información presente en el "tooltip"
        },
        legend: { // configuración de la leyenda
            layout: 'horizontal',
            align: 'center',
            verticalAlign: 'bottom',
            borderWidth: 1
        },
       series: [{
        name: 'Referencias totales',
        data: [724, 621, 481, 691, 590, 730]
    }, {
        name: 'Referencias <5 años',
        data: [252, 183, 178, 213, 160, 258]
    }, {
        name: 'Referencias >5 años',
        data: [472, 483, 303, 478, 430, 472]    
    }],
    responsive: {
        rules: [{
            condition: {
                maxWidth: 100
            },
            chartOptions: {
                legend: {
                    layout: 'horizontal',
                    align: 'center',
                    verticalAlign: 'bottom'
                }
            }
        }]
    }

});
		</script>
