<script src="Graficas/code/highcharts-3d.js"></script>
<script src="Graficas/code/modules/exporting.js"></script>
<script src="Graficas/code/modules/export-data.js"></script>
<script src="Graficas/code/modules/accessibility.js"></script>

<figure class="highcharts-figure">
    <div id="container"></div>
    <p class="highcharts-description">
        Representación gráfica del índice de institucionalidad total.
    </p>
</figure>


		<script type="text/javascript">
Highcharts.chart('container', {
    chart: {
        type: 'pie',
        options3d: {
            enabled: true,
            alpha: 45,
            beta: 0
        }
    },
    title: {
        text: 'índice de institucionalidad: 2015 - 2020'
    },
    accessibility: {
        point: {
            valueSuffix: '%'
        }
    },
    tooltip: {
        pointFormat: '{series.name}: <b>{point.percentage:.1f}%</b>'
    },
    plotOptions: {
        pie: {
            allowPointSelect: true,
            cursor: 'pointer',
            depth: 35,
            dataLabels: {
                enabled: true,
                format: '{point.name}'
            }
        }
    },
    series: [{
        type: 'pie',
        name: 'Porcentaje de institucionalidad',
        data: [
            ['2 instituciones 8%', 8.0],
            ['3 instituciones 2%', 2.0],
            {
                name: '1 institución 89%',
                y: 30.8,
                sliced: true,
                selected: true
            },
            ['Sin afiliación 1%', 1.0],
        ]
    }]
});
		</script>
	</body>
